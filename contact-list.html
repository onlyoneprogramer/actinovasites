<html>
<head>
    <title>문의 목록</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<h1>문의 목록</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>이메일</th>
        <th>유형</th>
        <th>상태</th>
        <th>시간</th>
    </tr>

    <c:forEach var="c" items="${contacts}">
        <tr>
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.email}</td>
            <td>${c.type}</td>
            <td>${c.status}</td>
            <td>${c.createdAt}</td>
        </tr>
    </c:forEach>

</table>

</body>
</html>
